<header class="app-topbar" role="banner">
  <div class="app-topbar-start">
    {% if session.get('usuario_nombre') %}
    <span class="app-topbar-user">
      <i class="bi bi-person-circle" aria-hidden="true"></i>
      <span class="app-topbar-user-name">{{ session.usuario_nombre }}</span>
    </span>
    {% endif %}
  </div>
  <a href="{{ url_for('auth.logout') }}" class="btn-app-logout">
    <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
    <span>Cerrar sesión</span>
  </a>
</header>
<script src="{{ url_for('static', filename='js/navigation-guard.js') }}"></script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Historias Clínicas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-heart-pulse"></i> Control de Historias Clínicas
            </a>
        </div>
    </nav>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-5 text-center">
                    <i class="bi bi-heart-pulse text-primary fs-1 mb-3"></i>
                    <h3 class="mb-4">Control de Historias Clínicas</h3>
                    <p class="text-muted mb-4">Seleccione el tipo de acceso</p>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="card h-100 border-primary">
                                <div class="card-body">
                                    <i class="bi bi-shield-lock text-primary fs-1 mb-3"></i>
                                    <h5>Administrador</h5>
                                    <p class="text-muted small">Acceso completo al sistema</p>
                                    <a href="{{ url_for('auth.login_admin') }}" class="btn btn-primary">
                                        <i class="bi bi-box-arrow-in-right"></i> Iniciar como Admin
                                    </a>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card h-100 border-info">
                                <div class="card-body">
                                    <i class="bi bi-clipboard-plus text-info fs-1 mb-3"></i>
                                    <h5>Personal de Admisión</h5>
                                    <p class="text-muted small">Registro de historias clínicas</p>
                                    <a href="{{ url_for('auth.login_admission') }}" class="btn btn-info text-white">
                                        <i class="bi bi-box-arrow-in-right"></i> Iniciar como Admisión
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/navigation-guard.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

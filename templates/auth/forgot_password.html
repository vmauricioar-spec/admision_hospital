<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-5">
                <div class="card security-card">
                    <div class="card-header p-3">
                        <h4 class="mb-0"><i class="bi bi-shield-lock me-2"></i>Recuperar contraseña</h4>
                    </div>
                    <div class="card-body p-4">
                        <p class="text-muted">
                            Ingresa tu usuario o correo y te enviaremos un enlace para restablecer tu contraseña.
                        </p>

                        {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}
                        {% if success %}
                        <div class="alert alert-success">{{ success }}</div>
                        {% endif %}

                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">Usuario o correo electrónico</label>
                                <input
                                    type="text"
                                    name="identifier"
                                    class="form-control"
                                    placeholder="ejemplo@correo.com o usuario"
                                    value="{{ identifier }}"
                                    required
                                >
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">
                                <i class="bi bi-send me-1"></i>Enviar enlace
                            </button>
                        </form>

                        <div class="text-center mt-3">
                            <a href="{{ url_for('auth.login_admission') }}" class="text-muted small">
                                Volver al login de admisión
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/navigation-guard.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

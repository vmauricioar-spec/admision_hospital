<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlace Inválido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5 col-lg-4">
                <div class="card text-center p-5">
                    <div class="card-body">
                        <i class="bi bi-exclamation-triangle text-danger fs-1 mb-3"></i>
                        <h4 class="card-title">Enlace Inválido o Expirado</h4>
                        <p class="text-muted">{{ message if message else 'Este enlace ya no es válido. Solicite uno nuevo a su administrador.' }}</p>
                        <a href="{{ url_for('auth.login_admission') }}" class="btn btn-primary">Ir al Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/navigation-guard.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
